server:
  port: 8080

spring:
  application:
    name: habitflow-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/habitflow_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Prashant@1033}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

app:
  jwt:
    # Generate your own 256-bit+ secret for production, e.g. openssl rand -base64 64
    secret: ${JWT_SECRET:habitflow_super_secret_key_change_this_in_production_minimum_256_bits_long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  ai:
    provider: ${AI_PROVIDER:anthropic} # anthropic | openai
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
      base-url: https://api.anthropic.com/v1/messages
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      base-url: https://api.openai.com/v1/chat/completions

logging:
  level:
    com.habitflow: INFO
    org.springframework.security: WARN
